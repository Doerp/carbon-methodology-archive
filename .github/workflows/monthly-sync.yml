name: Monthly Methodology Sync

on:
  schedule:
    - cron: '0 6 1 * *'   # 06:00 UTC on the 1st of every month
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write           # needed to commit and push changes

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run sync
        run: python scripts/run_sync.py

      - name: Generate changelog entry
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_changelog.py

      - name: Commit and push changes
        run: |
          git config user.name "methodology-sync-bot"
          git config user.email "bot@noreply.github.com"
          git add methodologies/ projects/ extracted/ CHANGELOG.md
          # Only commit if there are staged changes
          git diff --staged --quiet || git commit -m "sync: $(date -u +%Y-%m-%d) — methodology archive update"
          git push
